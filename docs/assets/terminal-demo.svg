<svg height="560" viewBox="0 0 980 560" width="980" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"><linearGradient id="a" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#13212c"/><stop offset="1" stop-color="#091116"/></linearGradient><rect fill="#dbe6ec" height="560" rx="24" width="980"/><rect fill="url(#a)" height="512" rx="18" width="924" x="28" y="24"/><circle cx="64" cy="52" fill="#ff5f57" r="8"/><circle cx="88" cy="52" fill="#febc2e" r="8"/><circle cx="112" cy="52" fill="#28c840" r="8"/><g font-family="Menlo, Monaco, Consolas, monospace"><text fill="#d6e4ef" font-size="20" text-anchor="middle" x="490" y="58">ghostlink</text><g font-size="23"><text fill="#8bd5ca" x="56" y="108">$ ghostlink create --source ~/Projects/site --dest ~/Desktop/site --save-name site-link -y</text><text fill="#a6e3a1" x="56" y="154">[OK] created: ~/Desktop/site -&gt; ~/Projects/site</text><text fill="#f9e2af" x="56" y="188">[SAVED] site-link</text><text fill="#8bd5ca" x="56" y="254">$ ghostlink check --saved</text><text fill="#a6e3a1" x="56" y="300">[OK] site-link: ~/Desktop/site -&gt; ~/Projects/site</text><text fill="#cdd6f4" x="56" y="334">Summary: 1 ok, 0 broken, 0 missing</text><text fill="#8bd5ca" x="56" y="400">$ ghostlink status</text><text fill="#cdd6f4" x="56" y="446">NAME TYPE STATUS LAST CHECKED</text><text fill="#a6e3a1" x="56" y="480">site-link link ok 2026-04-18T10:24:00Z</text></g></g></svg>
